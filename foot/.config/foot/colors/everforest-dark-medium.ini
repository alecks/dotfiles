# -*- conf -*-
# theme: Everforest Dark Medium
# description: A theme based on the Everforest Dark Medium palette

[colors]
# Everforest Dark Medium colors:
# background: #2d353b
# foreground: #d3c6aa
# special_background: #3d484d (used for bright black/cursor bg)
# aqua: #7fbbb3
# blue: #7fbbb3 (aqua doubles as blue in Everforest)
# green: #a7c080
# red: #e67e80
# yellow: #dbbc7f
# orange: #e69875
# dark_text_contrast: #2d353b (for cases where you need dark text on a bright color)

cursor=e69875 3d484d  # Everforest Orange for cursor, Special Background for cursor text background
foreground=d3c6aa       # Everforest Foreground
background=2d353b       # Everforest Background

# Regular ANSI Colors
regular0=3d484d # black       (Everforest Special Background for a softer black)
regular1=e67e80 # red         (Everforest Red)
regular2=a7c080 # green       (Everforest Green)
regular3=dbbc7f # yellow      (Everforest Yellow)
regular4=7fbbb3 # blue        (Everforest Aqua)
regular5=d699b6 # magenta     (Everforest Purple - a nice complementary pink-purple)
regular6=7fbbb3 # cyan        (Everforest Aqua for cyan)
regular7=d3c6aa # white       (Everforest Foreground for a soft white)

# Bright ANSI Colors
bright0=5c6a72 # bright black (Slightly lighter than special background for bright black)
bright1=e67e80 # bright red   (Everforest Red, usually the same as regular for reds)
bright2=a7c080 # bright green (Everforest Green, usually the same as regular for greens)
bright3=e69875 # bright yellow (Everforest Orange for a vivid yellow)
bright4=7fbbb3 # bright blue  (Everforest Aqua, usually the same as regular for blues)
bright5=d699b6 # bright magenta (Everforest Purple, same as regular)
bright6=7fbbb3 # bright cyan  (Everforest Aqua, same as regular)
bright7=edeada # bright white (Everforest Light Grey - slightly brighter than foreground)
